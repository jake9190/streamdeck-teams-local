<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MS Teams Local</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 12px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 13px;
      color: #d8d8d8;
      background: #2d2d2d;
    }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    input[type="checkbox"] { margin-top: 2px; }
    label { line-height: 1.4; }
    .hint { color: #8a8a8a; font-size: 11px; margin: 6px 0 0 24px; }
  </style>
</head>
<body>
  <div class="row">
    <input id="restoreFocus" type="checkbox" checked />
    <label for="restoreFocus">Restore previous window after pressing</label>
  </div>
  <div class="hint">
    When on, focus returns to the window you were using if Teams comes to the
    foreground. Turn off to let Teams keep focus (e.g. to keep typing in chat).
  </div>

  <script>
    let websocket = null;
    let pluginContext = null;
    let settings = {};

    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      pluginContext = inUUID;
      try {
        const actionInfo = JSON.parse(inActionInfo);
        settings = (actionInfo && actionInfo.payload && actionInfo.payload.settings) || {};
      } catch (e) {
        settings = {};
      }

      websocket = new WebSocket("ws://127.0.0.1:" + inPort);
      websocket.onopen = function () {
        websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));

        const cb = document.getElementById("restoreFocus");
        cb.checked = settings.restoreFocus !== false; // default: on
        cb.addEventListener("change", function () {
          settings.restoreFocus = cb.checked;
          websocket.send(JSON.stringify({
            event: "setSettings",
            context: pluginContext,
            payload: settings
          }));
        });
      };
    }
  </script>
</body>
</html>
