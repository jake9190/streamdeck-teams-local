name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/MsTeamsLocal.csproj

      - name: Build (Release)
        run: dotnet build src/MsTeamsLocal.csproj -c Release --no-restore

      - name: Publish into plugin package
        shell: pwsh
        run: ./build/build.ps1

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: msteams-local-plugin
          path: |
            com.local.msteams-local.sdPlugin/**
            !com.local.msteams-local.sdPlugin/logs/**
          if-no-files-found: error
